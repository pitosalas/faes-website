{{ chart_html | safe }}

<link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet">

<p class="secret-summary">
  In <select id="year-select">
    <option value="all">all years</option>
    {% for year in years %}
    <option value="{{ year }}"{% if loop.first %} selected{% endif %}>{{ year }}</option>
    {% endfor %}
  </select>
  — <span id="summary-text"></span>
</p>

<div id="grants-grid"></div>

<div class="org-year-section">
  <h2>Grants by Organization and Year</h2>
  <div id="org-year-grid"></div>
</div>

<script>window.SECRET_ROWS = {{ rows_json | safe }}; window.SECRET_YEARS = {{ years | tojson }};</script>
<script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
<script src="static/admin.js"></script>
