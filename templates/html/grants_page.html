<div class="grants-header">
  <h1>Grants</h1>
</div>
<h2 class="grants-list-header">Grant Recipients</h2>
<div class="grants-filter">
  <a class="filter-link active" data-filter="recent" href="#">Recent</a>
  <a class="filter-link" data-filter="all" href="#">All</a>
</div>
<div class="grants-grid">{{ cards_html | safe }}</div>
<script>
(function () {
  var links = document.querySelectorAll('.filter-link');
  var cards = document.querySelectorAll('.grant-card-wrapper');

  var TWELVE_MONTHS_AGO = new Date();
  TWELVE_MONTHS_AGO.setFullYear(TWELVE_MONTHS_AGO.getFullYear() - 1);

  function applyFilter(filter) {
    cards.forEach(function (card) {
      var show = filter === 'all' || new Date(card.dataset.date) >= TWELVE_MONTHS_AGO;
      card.style.display = show ? '' : 'none';
    });
  }

  links.forEach(function (link) {
    link.addEventListener('click', function (e) {
      e.preventDefault();
      links.forEach(function (l) { l.classList.remove('active'); });
      link.classList.add('active');
      applyFilter(link.dataset.filter);
    });
  });

  applyFilter('recent');
}());
</script>
