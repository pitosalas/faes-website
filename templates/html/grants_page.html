<div class="grants-header">
  <h1>Grants</h1>
</div>
{{ chart_html | safe }}
<h2 class="grants-list-header">Grant Recipients</h2>
<div class="grants-filter">
  <a class="filter-link" data-filter="current" href="#">Current</a>
  <a class="filter-link active" data-filter="last5" href="#">Last 5 Years</a>
  <a class="filter-link" data-filter="all" href="#">All Time</a>
</div>
<div class="grants-grid">{{ cards_html | safe }}</div>
<script>
(function () {
  var MAX_YEAR = {{ max_year }};
  var links = document.querySelectorAll('.filter-link');
  var cards = document.querySelectorAll('.grant-card-wrapper');
  var NOW_YEAR = new Date().getFullYear();

  function applyFilter(filter) {
    cards.forEach(function (card) {
      var year = parseInt(card.dataset.year, 10);
      var show;
      if (filter === 'current') show = year >= NOW_YEAR - 1;
      else if (filter === 'last5') show = year >= MAX_YEAR - 4;
      else show = true;
      card.style.display = show ? '' : 'none';
    });
  }

  links.forEach(function (link) {
    link.addEventListener('click', function (e) {
      e.preventDefault();
      links.forEach(function (l) { l.classList.remove('active'); });
      link.classList.add('active');
      applyFilter(link.dataset.filter);
    });
  });

  applyFilter('last5');
}());
</script>
