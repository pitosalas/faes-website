{{ chart_html | safe }}

<style>
  .secret-summary {
    margin-top: 1.8rem;
    margin-bottom: 1.2rem;
    font-size: 1.05rem;
    max-width: none;
  }
  .secret-summary select {
    font-family: var(--font-sans);
    font-size: 1.05rem;
    color: var(--color-accent);
    background: var(--color-accent-soft);
    border: 1px solid rgba(31, 90, 70, 0.3);
    border-radius: var(--radius-sm);
    padding: 0.1rem 0.5rem;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  .secret-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.92rem;
    margin-top: 0.5rem;
  }
  .secret-table thead th {
    text-align: left;
    padding: 0.55rem 0.75rem;
    border-bottom: 2px solid var(--color-accent);
    color: var(--color-accent);
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--color-accent-soft);
  }
  .secret-table tbody td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--color-border);
    vertical-align: top;
    color: var(--color-text);
  }
  .secret-table tbody tr:last-child td {
    border-bottom: none;
  }
  .secret-table tbody tr:hover td {
    background: var(--color-accent-soft);
  }
  .secret-table td:nth-child(1) {
    white-space: nowrap;
    color: var(--color-muted);
    font-size: 0.88rem;
  }
  .secret-table td:nth-child(3) {
    text-align: right;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .secret-table td:nth-child(4) {
    color: var(--color-muted);
    font-size: 0.88rem;
  }
</style>

<p class="secret-summary">
  In <select id="year-select">
    <option value="all">all years</option>
    {% for year in years %}
    <option value="{{ year }}"{% if loop.first %} selected{% endif %}>{{ year }}</option>
    {% endfor %}
  </select>
  — <span id="summary-text"></span>
</p>

<table class="secret-table">
  <thead>
    <tr>
      <th>Date</th>
      <th>Organization</th>
      <th>Amount</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody id="secret-tbody"></tbody>
</table>

<script>
(function () {
  var ALL_ROWS = {{ rows_json | safe }};
  var YEARS = {{ years | tojson }};

  var select = document.getElementById("year-select");
  var summaryText = document.getElementById("summary-text");
  var tbody = document.getElementById("secret-tbody");

  function formatAmount(n) {
    return "XCG\u00a0" + n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function render(year) {
    var rows = year === "all" ? ALL_ROWS : ALL_ROWS.filter(function (r) { return r.year === year; });
    var total = rows.reduce(function (s, r) { return s + r.amount; }, 0);
    var orgs = new Set(rows.map(function (r) { return r.nonprofit; })).size;
    summaryText.textContent = rows.length + " grants to " + orgs + " different organizations for a total of " + formatAmount(total);
    tbody.innerHTML = rows.map(function (r) {
      return "<tr><td>" + r.date + "</td><td>" + r.nonprofit + "</td><td>" + formatAmount(r.amount) + "</td><td>" + r.notes + "</td></tr>";
    }).join("");
  }

  select.addEventListener("change", function () {
    var val = select.value;
    render(val === "all" ? "all" : parseInt(val, 10));
  });

  render(YEARS.length ? YEARS[0] : "all");
}());
</script>
